log stderr all;
router id 192.168.50.67;

protocol device {
}

protocol direct {
    ipv4;
    interface "wg0";
}

protocol static advertised_routes {
    ipv4;
    route 0.0.0.0/1 via "wg0";
    route 128.0.0.0/1 via "wg0";
}

protocol bgp peplink {
    local as 65060;
    neighbor 192.168.50.1 as 12345;
    ipv4 {
        import none;
        export where proto = "advertised_routes";
    };
}
