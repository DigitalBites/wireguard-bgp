name: Container

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      channel:
        description: Image channel to build
        required: true
        default: dev
        type: choice
        options:
          - dev
          - release
      version:
        description: Version without arch suffix, for example 0.1.0
        required: false
        default: ""
      arches:
        description: "Comma-separated arches to build: amd64, arm64, or amd64,arm64"
        required: false
        default: ""

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE || 'digitalbites/wireguard-bgp' }}

jobs:
  plan:
    name: Resolve build plan
    runs-on: ubuntu-24.04
    outputs:
      arches: ${{ steps.arches.outputs.arches }}
      channel: ${{ steps.metadata.outputs.channel }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 0

      - name: Resolve arches
        id: arches
        env:
          REQUESTED_ARCHES: ${{ github.event.inputs.arches || vars.BUILD_ARCHES }}
        run: |
          arches="$(./scripts/resolve-arches.sh "${REQUESTED_ARCHES:-}")"
          echo "arches=$arches" >> "$GITHUB_OUTPUT"

      - name: Resolve version
        id: version
        env:
          REQUESTED_VERSION: ${{ github.event.inputs.version }}
        run: |
          version="${REQUESTED_VERSION:-}"
          if [ -z "$version" ]; then
            version="$(./scripts/resolve-version.sh)"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Resolve channel
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "channel=local" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "channel=release" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "channel=${{ github.event.inputs.channel }}" >> "$GITHUB_OUTPUT"
          else
            echo "channel=dev" >> "$GITHUB_OUTPUT"
          fi

  pr-build:
    name: PR build ${{ matrix.arch }}
    if: github.event_name == 'pull_request'
    needs: plan
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(needs.plan.outputs.arches) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Resolve arch metadata
        id: arch
        run: |
          arch="${{ matrix.arch }}"
          case "$arch" in
            amd64)
              echo "platform=linux/$arch" >> "$GITHUB_OUTPUT"
              echo "scan_local=true" >> "$GITHUB_OUTPUT"
              ;;
            arm64)
              echo "platform=linux/$arch" >> "$GITHUB_OUTPUT"
              echo "scan_local=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "unsupported arch: $arch" >&2
              exit 2
              ;;
          esac

      - name: Build image
        id: build
        env:
          ARCH: ${{ matrix.arch }}
          PLATFORM: ${{ steps.arch.outputs.platform }}
          CHANNEL: ${{ needs.plan.outputs.channel }}
          VERSION: ${{ needs.plan.outputs.version }}
          BASE_VERSION: ${{ needs.plan.outputs.version }}
          BUILD_ID: ${{ github.run_number }}
          SHORT_SHA: ${{ github.sha }}
          PUSH: false
          LOAD: ${{ steps.arch.outputs.scan_local }}
        run: ./scripts/docker-build.sh

      - name: Scan image
        if: steps.arch.outputs.scan_local == 'true'
        env:
          IMAGE_REF: ${{ steps.build.outputs.primary_tag }}
          IMAGE_PLATFORM: ${{ steps.arch.outputs.platform }}
        run: ./scripts/image-scan.sh

  publish:
    name: Publish ${{ matrix.arch }}
    if: github.event_name != 'pull_request'
    needs: plan
    runs-on: ubuntu-24.04
    environment: Build
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(needs.plan.outputs.arches) }}
    steps:
      - name: Resolve arch metadata
        id: arch
        run: |
          arch="${{ matrix.arch }}"
          case "$arch" in
            amd64|arm64)
              echo "platform=linux/$arch" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "unsupported arch: $arch" >&2
              exit 2
              ;;
          esac

      - name: Login to Docker Hub
        uses: docker/login-action@v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        id: build
        env:
          ARCH: ${{ matrix.arch }}
          PLATFORM: ${{ steps.arch.outputs.platform }}
          CHANNEL: ${{ needs.plan.outputs.channel }}
          VERSION: ${{ needs.plan.outputs.version }}
          BASE_VERSION: ${{ needs.plan.outputs.version }}
          BUILD_ID: ${{ github.run_number }}
          SHORT_SHA: ${{ github.sha }}
          PUSH: true
          LOAD: false
        run: ./scripts/docker-build.sh

      - name: Scan image
        env:
          IMAGE_REF: ${{ steps.build.outputs.primary_tag }}
          IMAGE_PLATFORM: ${{ steps.arch.outputs.platform }}
        run: ./scripts/image-scan.sh
