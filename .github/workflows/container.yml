name: Container

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      channel:
        description: Image channel to build
        required: true
        default: dev
        type: choice
        options:
          - dev
          - release
      version:
        description: Version without arch suffix, for example 0.1.0
        required: false
        default: ""
      arches:
        description: "Comma-separated arches to build: amd64, arm64, or amd64,arm64"
        required: false
        default: ""

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE || 'digitalbites/wireguard-bgp' }}

jobs:
  plan:
    name: Resolve build plan
    runs-on: ubuntu-24.04
    outputs:
      arches: ${{ steps.arches.outputs.arches }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 0

      - name: Resolve arches
        id: arches
        env:
          REQUESTED_ARCHES: ${{ github.event.inputs.arches || vars.BUILD_ARCHES }}
        run: |
          arches="$(./scripts/resolve-arches.sh "${REQUESTED_ARCHES:-}")"
          echo "arches=$arches" >> "$GITHUB_OUTPUT"

      - name: Resolve version
        id: version
        env:
          REQUESTED_VERSION: ${{ github.event.inputs.version }}
        run: |
          version="${REQUESTED_VERSION:-}"
          if [ -z "$version" ]; then
            version="$(./scripts/resolve-version.sh)"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.arch }}
    needs: plan
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(needs.plan.outputs.arches) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Resolve arch metadata
        id: arch
        run: |
          case "${{ matrix.arch }}" in
            amd64)
              echo "platform=linux/amd64" >> "$GITHUB_OUTPUT"
              echo "scan_local=true" >> "$GITHUB_OUTPUT"
              ;;
            arm64)
              echo "platform=linux/arm64" >> "$GITHUB_OUTPUT"
              echo "scan_local=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "unsupported arch: ${{ matrix.arch }}" >&2
              exit 2
              ;;
          esac

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            {
              echo "channel=local"
              echo "version=${{ needs.plan.outputs.version }}"
              echo "push=false"
              echo "load=${{ steps.arch.outputs.scan_local }}"
            } >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            {
              echo "channel=release"
              echo "version=${GITHUB_REF_NAME#v}"
              echo "push=true"
              echo "load=false"
            } >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${{ github.event.inputs.channel }}" == "release" ]]; then
            {
              echo "channel=release"
              echo "version=${{ needs.plan.outputs.version }}"
              echo "push=true"
              echo "load=false"
            } >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            {
              echo "channel=dev"
              echo "version=${{ needs.plan.outputs.version }}"
              echo "push=true"
              echo "load=false"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "channel=dev"
              echo "version=${{ needs.plan.outputs.version }}"
              echo "push=true"
              echo "load=false"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Docker Hub
        if: steps.meta.outputs.push == 'true'
        uses: docker/login-action@v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        id: build
        env:
          ARCH: ${{ matrix.arch }}
          PLATFORM: ${{ steps.arch.outputs.platform }}
          CHANNEL: ${{ steps.meta.outputs.channel }}
          VERSION: ${{ steps.meta.outputs.version }}
          BASE_VERSION: ${{ steps.meta.outputs.version }}
          BUILD_ID: ${{ github.run_number }}
          SHORT_SHA: ${{ github.sha }}
          PUSH: ${{ steps.meta.outputs.push }}
          LOAD: ${{ steps.meta.outputs.load }}
        run: ./scripts/docker-build.sh

      - name: Scan image
        if: steps.meta.outputs.push == 'true' || steps.arch.outputs.scan_local == 'true'
        env:
          IMAGE_REF: ${{ steps.build.outputs.primary_tag }}
        run: ./scripts/image-scan.sh
