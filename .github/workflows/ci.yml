name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Go checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Resolve Go version
        id: go-version
        run: |
          . ./scripts/ci-versions.env
          echo "version=$GO_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ steps.go-version.outputs.version }}
          cache: true

      - name: Install check tools
        run: ./scripts/install-ci-tools.sh

      - name: Run reusable check script
        run: ./scripts/ci-check.sh

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5.0.0
        with:
          fail-on-severity: high

  codeql:
    name: CodeQL
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Resolve Go version
        id: go-version
        run: |
          . ./scripts/ci-versions.env
          echo "version=$GO_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ steps.go-version.outputs.version }}
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.36.0
        with:
          languages: go
          build-mode: manual

      - name: Build for CodeQL
        run: go build ./cmd/peplink-wg-bgp

      - name: Analyze
        uses: github/codeql-action/analyze@v4.36.0
